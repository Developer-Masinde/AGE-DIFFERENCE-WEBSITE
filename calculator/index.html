<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>

    body {
        background-image: url("./images/students.jpg");
        
    }

#calculator {
    background-color: rgb(51, 32, 32);
    border-radius: 14px;
    font-family: Arial, Helvetica, sans-serif;
    max-width: 450px;
    overflow: hidden;
}

#display {
    width: 50%;
    padding: 2cqh;
    text-align: right;
    border: none;
    font-size: 3rem;
    background-color: rgb(79, 206, 206);
    color: white;
}

#keys {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 2px;
}

button {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    border: none;
    background-color: chocolate;
    color: rgb(10, 10, 10);
    font-size: 2rem;
    font-weight: bold;
    cursor:pointer ;
}
button:hover {
    background-color: rgb(103, 103, 236);
}
button:active {
    background-color: rgb(235, 235, 12); 
}

.operator-btn {
     background-color: rgb(117, 145, 75);
}
.operator-btn:hover {
     background-color: rgb(89, 90, 88);
}

.operator-btn:active {
       background-color: rgb(226, 65, 7);
}
</style>
</head>
<body>
    <div id="calculator">
       
<input id="display" readonly>
<div id="keys">
    <button onclick="appendToDisplay(`+`)" class="operator-btn">+</button>
    <button onclick="appendToDisplay(`7`)">7</button>
    <button onclick="appendToDisplay(`8`)">8</button>
    <button onclick="appendToDisplay(`9`)">9</button>
    <button onclick="appendToDisplay(`-`)" class="operator-btn">-</button>
    <button onclick="appendToDisplay(`4`)">4</button>
    <button onclick="appendToDisplay(`5`)">5</button>
    <button onclick="appendToDisplay(`6`)">6</button>
    <button onclick="appendToDisplay(`*`)" class="operator-btn">*</button>
    <button onclick="appendToDisplay(`1`)">1</button>
    <button onclick="appendToDisplay(`2`)">2</button>
    <button onclick="appendToDisplay(`3`)">3</button>
    <button onclick="appendToDisplay(`/`)" class="operator-btn">/</button>
    <button onclick="appendToDisplay(`0`)">0</button>
    <button onclick="appendToDisplay(`.`)">.</button>
       <button onclick="calculate()">=</button>
       <button onclick="clearDisplay()" class="operator-btn">C</button>


</div>


    </div>


</body>
<script src="./index.js"></script>
</html>
