<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      body {
        background-image: url("pexels-clickerhappy-9315.jpg");
        grid-template-areas: "header header logo";
      }
      #header {
        grid-area: header;
        color: rgb(245, 241, 240);
       
      }

      #logo {
        display: grid;
        grid-area: logo;
        justify-self: end;
      }

      #table {
        display: grid;
        align-items: center;
        justify-content: center;
      }
      #table th {
        background-color: rgb(59, 39, 24);
        color: white;
        border-radius: 5px 5px 5px 5px;
        border: 2px 2px 2px 2px;
      }
      #table tr {
        background-color: rgb(59, 65, 63);
      }
      #table tr,
      td {
        background-color: rgb(100, 44, 4);
        padding: 50px 50px 50px 50px;
        border-radius: 5px 5px 5px 5px;
        border: 2px 2px 2px 2px;
      }

      #resultTotal {
        align-items: center;
        justify-content: center;
        display: grid;
      }

      button {
        background-color: rgb(24, 10, 1);
        padding: 20px 20px 20px 20px;
        border-radius: 5px 5px 5px 5px;
        border: 2px 2px 2px 2px;
        cursor: pointer;
        color: aliceblue;
      }

      button:hover {
        color: orange;
      }
      button:active {
        color: rgb(247, 242, 240);
      }
      h1 {
        align-items: center;
        justify-content: center;
        display: flex;
        color: rgb(245, 241, 240);
      
      }

     #card-container {
        display: grid;
     
        padding: 100px;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        height: auto;
        width: auto;
      }

            img {
        object-fit: cover;
        display: grid;
        width: 100%;
        height: 100%;
        border-radius: 20px;
        align-items: center;
        justify-content: center;
        background-color: rgb(75, 34, 5);
      }

    </style>
  </head>
  <body>
        <div id="header">
             <header id="header">
      <b>Form Ya Coffee Kajoint</b>
      
 </header>

        </div>


    <h1>MENU</h1>
    <div id="card-container">
      
    <div id="table">
      <table>
        <tr>
          <th>Coffee Type</th>
          <th>Price</th>
          <th>Quantity</th>
        </tr>
        <tr>
          <td>Cappuccino</td>
          <td>Ksh.250.00</td>
          <td id="qty1" value="0" placeholder="Enter Quantity">
            <input type="number" />
          </td>
        </tr>
        <tr>
          <td>Caffe latte</td>
          <td>Ksh.300.00</td>
          <td id="qty2" value="0" placeholder="Enter Quantity">
            <input type="number" />
          </td>
        </tr>
        <tr>
          <td>White Coffee</td>
          <td>Ksh.150.00</td>
          <td id="qty3" value="0" placeholder="Enter Quantity">
            <input type="number" />
          </td>
        </tr>
      </table>
    </div>
       
    <div>
      <img src="./unique coffeMug.jpg" alt="profile-img1">
    </div>

    <div>
      <img src="./takingCoffee.jpg" alt="profile-img2">
    </div>
    </div>


    <div id="resultTotal">
      <button onclick="total()">Total Cost</button>
      <button onclick="submit()">Submit Order</button>
      <button> Ksh.0.00</button>
     
    </div>
  </body>

  <script src="./coffee.js"></script>
</html>
