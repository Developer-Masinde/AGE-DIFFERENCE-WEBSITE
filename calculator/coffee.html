<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      body {
        background-image: url("pexels-clickerhappy-9315.jpg");
        grid-template-areas: "header header logo";
      }
      #header {
        grid-area: header;
        color: rgb(245, 241, 240);
       
      }

      #logo {
        display: grid;
        grid-area: logo;
        justify-self: end;
      }

      #table {
        display: grid;
        align-items: center;
        justify-content: center;
      }
      #table th {
        background-color: black;
        color: white;
        border-radius: 5px 5px 5px 5px;
        border: 2px 2px 2px 2px;
      }
      #table tr {
        background-color: rgb(59, 65, 63);
      }
      #table tr,
      td {
        background-color: rgb(100, 44, 4);
        padding: 50px 50px 50px 50px;
        border-radius: 5px 5px 5px 5px;
        border: 2px 2px 2px 2px;
      }

      #resultTotal {
        align-items: center;
        justify-content: center;
        display: grid;
      }

      button {
        background-color: rgb(24, 10, 1);
        padding: 20px 20px 20px 20px;
        border-radius: 5px 5px 5px 5px;
        border: 2px 2px 2px 2px;
        cursor: pointer;
        color: aliceblue;
      }

      button:hover {
        color: orange;
      }
      button:active {
        color: rgb(247, 242, 240);
      }
      h1 {
        align-items: center;
        justify-content: center;
        display: flex;
        color: rgb(245, 241, 240);
      
      }

     #card-container {
        display: grid;
     
        padding: 100px;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        height: auto;
        width: auto;
       
      }

            img {
        object-fit: cover;
        display: grid;
        width: 100%;
        height: 100%;
        border-radius: 20px;
        align-items: center;
        justify-content: center;
        background-color: rgb(75, 34, 5);
      }

      h2 {
        color: rgb(247, 244, 243);
      }
      #nav-bar {
        background-color: rgb(7, 3, 0);
        
      }
      #nav-bar li {
         text-decoration: none;
      }
      #nav-bar ul,li {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 16px;
        color: chocolate;
        justify-self: right;
       
        
      }
      #nav-bar :hover{
        cursor: pointer;
        color: rgb(194, 152, 122);
      }

        #footer-section {
          background-color: rgb(7, 3, 0);
        }

              #footer-section ul,li {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 16px;
        color: rgb(252, 117, 6);
        justify-self: left;
        
        
      }
            #footer-section :hover{
        cursor: pointer;
        color: rgb(194, 152, 122);
      }

    </style>
  </head>
  <body>

         <div id="nav-bar">
           <ul>
            <li><a href="about.html">ABOUT-US</a></li>
            <li><a href="./product.html">PRODUCTS</a></li>
            <li><a href="branches.html">BRANCHES</a></li>
           </ul>
         </div>

       
             <header id="header">
          <h2>
             <b>Form Ya Coffee Kajoint</b> <br>
      <b>A sip of coffee awakens the day☕</b>
          </h2>
      
 </header>

       


    <h1>MENU</h1>
    <div id="card-container">
      
    <div id="table">
      <table>
        <tr>
          <th>Coffee Type</th>
          <th>Price</th>
          <th>Quantity</th>
        </tr>
        <tr>
          <td>Cappuccino</td>
          <td>Ksh.250.00</td>
          <td>
                 <input
             type="number"
            id="qty1" 
          value="0" 
          placeholder="Enter Quantity">
          </td>
        </tr>
        <tr>
          <td>Caffe latte</td>
          <td>Ksh.300.00</td>
          <td> 
            <input
             type="number"
            id="qty2" 
          value="0" 
          placeholder="Enter Quantity">
          </td>
        </tr>
        <tr>
          <td>White Coffee</td>
          <td>Ksh.150.00</td>
          <td>
                <input
             type="number"
            id="qty3" 
          value="0" 
          placeholder="Enter Quantity">
          </td>
      
        </tr>
      </table>
    </div>
       
    <div>
      <img src="./unique coffeMug.jpg" alt="profile-img1">
    </div>

    <div>
      <img src="./takingCoffee.jpg" alt="profile-img2">
    </div>
    </div>


    <div id="resultTotal">
      <button onclick="total()">Total Cost</button>
      <button onclick="submitOrder()">Submit Order</button>
       <p> Ksh.0.00</p>
    </div>

   <footer id="footer-section">
           <ul>
            <li>OFFER-DAYS</li>
            <li>WORKING-HRS</li>
           </ul>
         </div>

   </footer>
  </body>

  <script src="./coffee.js"></script>
</html>
